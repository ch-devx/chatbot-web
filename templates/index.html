{% extends "base.html" %}
{% block content %}

<div class="chat-window">
    {% for message in history %}
        <div class="message {{ message.role }}">
            <span class="label">{{ "You" if message.role == "user" else "Assistant" }}</span>
            <p>{{ message.text }}</p>
        </div>
    {% endfor %}
</div>

<form action="/response" method="post" class="input-form">
    <input type="text" placeholder="Type your message…" name="user_input" class="user_input" autocomplete="off" autofocus>
    <button type="submit">Send</button>
</form>

<div class="footer-row">
    <a href="/reset" class="reset-btn">New chat</a>
</div>

{% endblock %}
